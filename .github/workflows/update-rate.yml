name: Oppdater EUR/NOK valutakurs

on:
  schedule:
    # Kjøres kl. 09:30 Oslo-tid (07:30 UTC) alle hverdager
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # Kan også kjøres manuelt

jobs:
  update-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Hent EUR/NOK kurs fra Norges Bank
        id: fetch_rate
        run: |
          # Prøv Norges Bank først
          RATE=$(curl -sf --max-time 10 \
            "https://data.norges-bank.no/api/data/EXR/B.EUR.NOK.SP?format=sdmx-json&lastNObservations=1" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          ds = d.get('data', {}).get('dataSets') or d.get('dataSets')
          series = ds[0]['series']
          key = list(series.keys())[0]
          obs = series[key]['observations']
          last_key = sorted(obs.keys(), key=int)[-1]
          print(obs[last_key][0])
          " 2>/dev/null) || true

          # Fallback: Frankfurter/ECB
          if [ -z "$RATE" ] || [ "$RATE" = "None" ]; then
            RATE=$(curl -sf --max-time 10 \
              "https://api.frankfurter.app/latest?from=EUR&to=NOK" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['rates']['NOK'])" \
              2>/dev/null) || true
          fi

          # Fallback: open.er-api
          if [ -z "$RATE" ] || [ "$RATE" = "None" ]; then
            RATE=$(curl -sf --max-time 10 \
              "https://open.er-api.com/v6/latest/EUR" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['rates']['NOK'])" \
              2>/dev/null) || true
          fi

          if [ -z "$RATE" ] || [ "$RATE" = "None" ]; then
            echo "FEIL: Ingen kurskilder svarte" >&2
            exit 1
          fi

          echo "rate=$RATE" >> $GITHUB_OUTPUT
          echo "Hentet EUR/NOK: $RATE"

      - name: Skriv rate.json
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "{\"rate\": ${{ steps.fetch_rate.outputs.rate }}, \"date\": \"$DATE\", \"source\": \"norges-bank\"}" > rate.json
          cat rate.json

      - name: Commit og push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rate.json
          git diff --staged --quiet && echo "Ingen endring i kurs" || \
            git commit -m "Oppdater EUR/NOK kurs $(date +%Y-%m-%d)"
          git push
